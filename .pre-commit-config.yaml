# Pre-commit hooks for schwannden-skills — a publish-on-commit Markdown repo.
# Setup:  uv tool install pre-commit && pre-commit install
# See AGENTS.md "Pre-publish safety checklist" for the policy these enforce.
#
# Vendored skills (skills/writing-skills/, from obra/superpowers) are excluded
# from lint/format hooks — AGENTS.md forbids reformatting vendored content.
default_install_hook_types: [pre-commit, commit-msg]

exclude: '^skills/writing-skills/'

repos:
  # Generic file hygiene + structural validation of JSON/YAML.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
        # --unsafe validates syntax without resolving custom tags
        # (e.g. Docker Compose's !override in an asset file).
        args: [--unsafe]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=1024]

  # Markdown linting (the bulk of the repo). Config: .markdownlint-cli2.yaml
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  # Sanitation: scan for secrets (patterned credentials).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Git linting: enforce Conventional Commits on the commit message.
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  # Repo-specific local hooks.
  - repo: local
    hooks:
      # Free-form PII guard (corporate email, home paths, username) — the part
      # of the pre-publish checklist gitleaks can't catch.
      - id: forbid-pii
        name: pre-publish PII guard
        entry: scripts/check-no-pii.sh
        language: script
        types: [text]
      # Registration invariant: skills/plugins <-> marketplace.json <-> README,
      # plus SKILL.md frontmatter rules. Global check — always run.
      - id: check-registration
        name: registration + frontmatter check
        entry: python3 scripts/check-registration.py
        language: system
        pass_filenames: false
        always_run: true
