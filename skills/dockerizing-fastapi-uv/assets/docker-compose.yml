# Base compose file. Targets `prod` builds for local-prod parity.
# Pair with docker-compose.override.yml (auto-merged) for daily dev with hot reload.
#
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.override.yml up --wait
#
# To run prod-target images locally (parity testing):
#   docker compose -f infra/docker-compose.yml up --build

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
      target: prod
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in infra/.env or your shell}
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Optional web service. Remove if your project is api-only.
  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
      target: prod
    depends_on:
      - api
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  dbdata:
