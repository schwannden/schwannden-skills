# nginx config for the web container's `prod` target.
# - SPA fallback so client-side routes resolve to index.html on refresh.
# - Reverse proxy /api/* -> api:8000, with SSE-friendly buffering disabled.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long cache for hashed asset filenames produced by Vite build.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Local-only proxy. A static/CDN host handles /api routing in production via rewrites.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: disable buffering so tokens stream to the client as they arrive.
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        1h;
        proxy_send_timeout        1h;
        chunked_transfer_encoding on;
    }
}
